<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WePullData</title>
  <!-- Fonts embedded as base64 data URI to avoid CSP blocking in MV3 extension iframes -->
  <style>
    /* System font stack — no external font requests needed */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 320px;
      height: 100vh;
      overflow: hidden;
      background: #fbfaf6;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', system-ui, sans-serif;
      font-size: 13px;
      color: #1c1a15;
      -webkit-font-smoothing: antialiased;
    }
    button { font-family: inherit; cursor: pointer; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #e4e0d6; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="sidebar-app.js"></script>
</body>
</html>
